name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: test-secret-key-for-ci
      DATABASE_URL: postgres://saep:saep@localhost:5432/test_wms_saep
      DJANGO_SETTINGS_MODULE: config.settings.test
      TEST_SETTINGS_MODULE: config.settings.test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: saep
          POSTGRES_PASSWORD: saep
          POSTGRES_DB: test_wms_saep
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Bootstrap environment
        run: make init DATABASE_URL="$DATABASE_URL" DJANGO_SETTINGS_MODULE="$DJANGO_SETTINGS_MODULE" TEST_SETTINGS_MODULE="$TEST_SETTINGS_MODULE" SECRET_KEY="$SECRET_KEY"
      - name: Rebuild ephemeral schema/migrations
        run: make setup DATABASE_URL="$DATABASE_URL" DJANGO_SETTINGS_MODULE="$DJANGO_SETTINGS_MODULE" TEST_SETTINGS_MODULE="$TEST_SETTINGS_MODULE" SECRET_KEY="$SECRET_KEY"
      - name: Django check
        run: uv run python manage.py check
      - name: Run pytest
        run: make test DATABASE_URL="$DATABASE_URL" DJANGO_SETTINGS_MODULE="$DJANGO_SETTINGS_MODULE" TEST_SETTINGS_MODULE="$TEST_SETTINGS_MODULE" SECRET_KEY="$SECRET_KEY"

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: saep
          POSTGRES_PASSWORD: saep
          POSTGRES_DB: test_wms_saep
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      SECRET_KEY: test-secret-key-for-ci
      DATABASE_URL: postgres://saep:saep@localhost:5432/test_wms_saep
      DJANGO_SETTINGS_MODULE: config.settings.test
      TEST_SETTINGS_MODULE: config.settings.test
      PNPM: pnpm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install backend dependencies
        run: uv sync --locked
      - name: Install frontend dependencies
        run: make frontend-deps
      - name: Generate frontend API types
        run: make frontend-gen-api
      - name: Lint frontend
        run: make frontend-lint
      - name: Build frontend
        run: make frontend-build
      - name: Check generated frontend API contract
        run: |
          git diff --exit-code -- frontend/openapi/schema.json frontend/src/shared/api/schema.d.ts || {
            echo "Run 'make frontend-gen-api' locally and commit the updated files."
            exit 1
          }

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: saep
          POSTGRES_PASSWORD: saep
          POSTGRES_DB: test_wms_saep
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      SECRET_KEY: test-secret-key-for-ci
      DATABASE_URL: postgres://saep:saep@localhost:5432/test_wms_saep
      DJANGO_SETTINGS_MODULE: config.settings.test
      TEST_SETTINGS_MODULE: config.settings.test
      PNPM: pnpm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install backend dependencies
        run: uv sync --locked
      - name: Install frontend dependencies
        run: make frontend-deps
      - name: Install Playwright Chromium
        run: cd frontend && ./node_modules/.bin/playwright install --with-deps chromium
      - name: Rebuild ephemeral schema/migrations
        run: make setup DATABASE_URL="$DATABASE_URL" DJANGO_SETTINGS_MODULE="$DJANGO_SETTINGS_MODULE" TEST_SETTINGS_MODULE="$TEST_SETTINGS_MODULE" SECRET_KEY="$SECRET_KEY"
      - name: Seed pilot baseline
        run: make seed-pilot-minimo DATABASE_URL="$DATABASE_URL" DJANGO_SETTINGS_MODULE="$DJANGO_SETTINGS_MODULE" TEST_SETTINGS_MODULE="$TEST_SETTINGS_MODULE" SECRET_KEY="$SECRET_KEY"
      - name: Run frontend real E2E
        run: make frontend-e2e DATABASE_URL="$DATABASE_URL" DJANGO_SETTINGS_MODULE="$DJANGO_SETTINGS_MODULE" TEST_SETTINGS_MODULE="$TEST_SETTINGS_MODULE" SECRET_KEY="$SECRET_KEY"
      - name: Upload Playwright artifacts
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore
